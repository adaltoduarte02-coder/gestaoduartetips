[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/football-fixtures"
  to = "/.netlify/functions/football-fixtures"
  status = 200
  force = true

[[redirects]]
  from = "/api/football-analysis"
  to = "/.netlify/functions/football-analysis"
  status = 200
  force = true

[[redirects]]
  from = "/netlify/functions/football-fixtures"
  to = "/.netlify/functions/football-fixtures"
  status = 200
  force = true

[[redirects]]
  from = "/netlify/functions/football-analysis"
  to = "/.netlify/functions/football-analysis"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/style-v2.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/style-v3.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/style-v4.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/style-v5.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
